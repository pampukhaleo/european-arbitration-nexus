          media="print"
          onload="this.media='all'"
  />

  <!--
    Generic site-wide defaults for no-JS crawlers. react-helmet-async
    (src/components/RouteSeo.tsx + src/components/Seo.tsx) replaces these
    per-route on hydration with the correct localized values + canonical +
    hreflang for the current URL.

    NOTE: We intentionally do NOT ship a hard-coded <link rel="canonical">
    or <meta property="og:url"> here, because Lovable hosting serves this
    same index.html for every deep link (e.g. /fr/eac/about). A wrong
    canonical pointing at /en would be applied to ~150 distinct URLs and
    flagged by SEO crawlers as "duplicate pages without canonical".
    No canonical at all on the raw HTML pass is preferable; Helmet adds the
    correct one on JS render.
  -->
  <title>European Arbitration Chamber (EAC)</title>
  <meta name="description" content="The European Arbitration Chamber (EAC) is an international non-profit association founded in Belgium in 2008 by professionals in commercial arbitration and mediation." />

  <!-- Open Graph (generic site-level fallback; per-route values injected by Helmet) -->
  <meta property="og:title" content="European Arbitration Chamber (EAC)" />
  <meta property="og:description" content="The European Arbitration Chamber (EAC) is an international non-profit association founded in Belgium in 2008 by professionals in commercial arbitration and mediation." />
  <meta property="og:image" content="https://chea-taic.be/eap-banner-1200x630.png" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="European Arbitration Chamber (EAC)" />

  <!-- Twitter (generic fallback) -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@EAC_Arbitration" />
  <meta name="twitter:title" content="European Arbitration Chamber (EAC)" />
  <meta name="twitter:description" content="The European Arbitration Chamber (EAC) is an international non-profit association founded in Belgium in 2008 by professionals in commercial arbitration and mediation." />
  <meta name="twitter:image" content="https://chea-taic.be/eap-banner-1200x630.png" />
</head>
